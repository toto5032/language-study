<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>토토's Daily 영어 학습</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="header">
    <h1>Daily English</h1>
    <p>매일 5문장, AI와 함께 영어 마스터하기</p>
</div>

<div class="container">

    <!-- 주제 입력 -->
    <div class="topic-section">
        <h2>오늘의 학습 주제</h2>
        <div class="topic-form">
            <input type="text" id="topicInput"
                   placeholder="예: 카페에서 주문하기, 병원 예약, 직장 동료와 대화..."
                   onkeydown="if(event.key==='Enter') generateSentences()">
            <button class="btn btn-primary" id="generateBtn" onclick="generateSentences()">
                오늘의 문장 받기
            </button>
        </div>
        <!-- 난이도 선택 -->
        <div class="difficulty-selector">
            <span class="difficulty-label">난이도:</span>
            <button class="difficulty-btn active" data-level="basic" onclick="selectDifficulty(this)">Basic</button>
            <button class="difficulty-btn" data-level="intermediate" onclick="selectDifficulty(this)">Intermediate</button>
            <button class="difficulty-btn" data-level="advanced" onclick="selectDifficulty(this)">Advanced</button>
        </div>
    </div>

    <!-- 진행률 -->
    <div class="progress-section" id="progressSection" style="display:none;"></div>

    <!-- 리셋 버튼 영역 -->
    <div class="reset-section" id="resetSection" style="display:none;">
        <button class="btn btn-reset" onclick="resetSentences()">🔄 문장 초기화하고 새로 받기</button>
    </div>

    <!-- 문장 목록 -->
    <div class="sentence-list" id="sentenceList">
        <div class="empty-state">
            <p>아직 오늘의 문장이 없습니다</p>
            <p>위에서 주제를 입력하고 문장을 받아보세요!</p>
        </div>
    </div>

    <!-- 학습 기록 -->
    <div class="history-section" id="historySection"></div>

</div>

<!-- 채팅 모달 -->
<div class="modal-overlay" id="chatModal">
    <div class="modal">
        <div class="modal-header">
            <h3>AI 튜터와 대화</h3>
            <button class="modal-close" onclick="closeChat()">&times;</button>
        </div>
        <div class="chat-area" id="chatArea"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="영어로 대화해보세요...">
            <button class="btn-mic" id="micBtn" onclick="toggleVoice()" title="음성 입력">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                    <line x1="12" y1="19" x2="12" y2="23"/>
                    <line x1="8" y1="23" x2="16" y2="23"/>
                </svg>
                <span class="rec-dot" id="recDot"></span>
            </button>
            <button class="btn btn-primary btn-sm" onclick="sendMessage()">전송</button>
        </div>
        <div class="chat-actions">
            <button class="btn btn-success btn-sm" onclick="evaluateAndComplete()">학습 평가 받기</button>
        </div>
    </div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
